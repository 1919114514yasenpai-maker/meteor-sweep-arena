<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>流星掃射 -ARENA- (Socket.io)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:#0a0d1a; --bg-panel:#111730;
    --neon-cyan:#4cf3ff; --neon-magenta:#ff2e88; --neon-amber:#ffd447;
    --neon-lime:#8dff5c; --neon-violet:#b784ff; --neon-orange:#ff9d4c;
    --text-primary:#e8ecff; --text-dim:#6b7394;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none;}
  html,body{ margin:0; padding:0; height:100%; background:var(--bg-deep);
    font-family:'Space Mono', monospace; color:var(--text-primary); overflow:hidden;
    touch-action:none; display:flex; align-items:center; justify-content:center; }
  .stage{ position:relative; width:min(100vw, 56.25vh); height:min(177.7vw, 100vh);
    max-width:480px; max-height:760px; background:#05070f;
    box-shadow:0 0 0 1px rgba(76,243,255,0.15), 0 0 60px rgba(76,243,255,0.08);
    border-radius:6px; overflow:hidden; }
  canvas{ display:block; width:100%; height:100%; touch-action:none; }
  .scanlines{ position:absolute; inset:0; pointer-events:none;
    background:repeating-linear-gradient(to bottom, rgba(0,0,0,0) 0px, rgba(0,0,0,0) 2px, rgba(0,0,0,0.12) 3px, rgba(0,0,0,0.12) 3px);
    mix-blend-mode:multiply; z-index:5; }
  .vignette{ position:absolute; inset:0; pointer-events:none; box-shadow: inset 0 0 90px 30px rgba(0,0,0,0.65); z-index:6; }

  .overlay{ position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; background:rgba(6,8,18,0.92); z-index:20; padding:22px; gap:10px; }
  .hidden{ display:none; }
  .title-jp{ font-family:'DotGothic16', sans-serif; font-size:30px; color:var(--neon-cyan);
    text-shadow:0 0 12px rgba(76,243,255,0.8), 0 0 30px rgba(76,243,255,0.4); letter-spacing:3px; margin:0; }
  .title-en{ font-size:11px; letter-spacing:6px; color:var(--text-dim); margin-top:-6px; }
  .btn{ font-family:'DotGothic16', sans-serif; background:transparent; border:1px solid var(--neon-magenta);
    color:var(--neon-magenta); padding:10px 26px; font-size:15px; letter-spacing:3px; cursor:pointer;
    box-shadow:0 0 14px rgba(255,46,136,0.35); transition:all .15s ease; }
  .btn:hover, .btn:active{ background:var(--neon-magenta); color:var(--bg-deep); }
  .btn:disabled{ opacity:0.4; cursor:default; }
  .desc{ font-size:11px; color:var(--text-dim); line-height:1.8; max-width:290px; }
  .desc b{ color:var(--neon-amber); font-weight:700; }
  .field{ display:flex; flex-direction:column; gap:6px; width:230px; }
  .field label{ font-size:10px; letter-spacing:2px; color:var(--text-dim); text-align:left; }
  .field input[type=text]{ background:var(--bg-panel); border:1px solid rgba(76,243,255,0.3); color:var(--text-primary);
    font-family:'Space Mono',monospace; padding:8px 10px; font-size:13px; letter-spacing:1px; outline:none; }
  .swatches{ display:flex; gap:8px; justify-content:center; flex-wrap:wrap; width:230px; }
  .swatch{ width:26px; height:26px; border-radius:50%; cursor:pointer; border:2px solid transparent; }
  .swatch.selected{ border-color:#fff; box-shadow:0 0 10px currentColor; }
  .status{ font-size:10px; color:var(--neon-lime); letter-spacing:1px; }
  .status.err{ color:var(--neon-magenta); }

  .hud{ position:absolute; top:0; left:0; right:0; z-index:8; pointer-events:none; padding:8px 10px; }
  .hud-top{ display:flex; justify-content:space-between; align-items:flex-start; }
  .hpbar-wrap{ width:130px; }
  .hpbar-label{ font-size:8px; letter-spacing:2px; color:var(--text-dim); margin-bottom:2px; }
  .hpbar-bg{ width:100%; height:9px; background:rgba(255,255,255,0.08); border:1px solid rgba(76,243,255,0.25); }
  .hpbar-fill{ height:100%; background:linear-gradient(90deg, var(--neon-magenta), var(--neon-amber)); width:100%; transition:width .15s linear; }
  .online-badge{ font-size:9px; color:var(--neon-cyan); text-align:right; letter-spacing:1px; }
  .online-badge .dot{ display:inline-block; width:6px; height:6px; border-radius:50%; background:var(--neon-lime); margin-right:4px; box-shadow:0 0 6px var(--neon-lime); }
  .killfeed{ position:absolute; top:44px; right:10px; z-index:8; display:flex; flex-direction:column; gap:3px; align-items:flex-end; pointer-events:none; }
  .killfeed div{ font-size:9px; background:rgba(8,10,20,0.7); padding:3px 7px; border-left:2px solid var(--neon-magenta); color:var(--text-primary); letter-spacing:0.5px; opacity:0.95; }

  .score-toggle{ position:absolute; top:8px; left:50%; transform:translateX(-50%); z-index:9;
    font-family:'DotGothic16', sans-serif; font-size:10px; letter-spacing:2px; color:var(--neon-cyan);
    background:rgba(8,10,20,0.55); border:1px solid rgba(76,243,255,0.3); padding:4px 10px; cursor:pointer; pointer-events:auto; }
  .scoreboard{ position:absolute; top:34px; left:50%; transform:translateX(-50%); z-index:9;
    background:rgba(6,8,18,0.92); border:1px solid rgba(76,243,255,0.3); padding:10px 14px; min-width:210px; font-size:11px; z-index:15; }
  .scoreboard h4{ margin:0 0 6px; font-family:'DotGothic16',sans-serif; font-size:12px; color:var(--neon-amber); letter-spacing:2px; text-align:center; }
  .scoreboard table{ width:100%; border-collapse:collapse; }
  .scoreboard td{ padding:2px 4px; font-size:10px; }
  .scoreboard .nm{ text-align:left; }
  .scoreboard .kd{ text-align:right; color:var(--text-dim); }

  .death-overlay{ position:absolute; inset:0; z-index:18; display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:rgba(20,4,10,0.75); gap:8px; }
  .death-overlay .t{ font-family:'DotGothic16', sans-serif; font-size:22px; color:var(--neon-magenta); letter-spacing:3px; text-shadow:0 0 14px rgba(255,46,136,0.7); }
  .death-overlay .c{ font-size:32px; color:var(--neon-amber); font-weight:700; }
  .death-overlay .by{ font-size:11px; color:var(--text-dim); }

  .sync-note{ position:absolute; bottom:6px; left:50%; transform:translateX(-50%); z-index:8;
    font-size:8px; letter-spacing:1px; color:var(--neon-lime); opacity:0.8; pointer-events:none; }
</style>
</head>
<body>
<div class="stage" id="stage">
  <canvas id="game"></canvas>
  <div class="scanlines"></div>
  <div class="vignette"></div>

  <div class="hud">
    <div class="hud-top">
      <div class="hpbar-wrap">
        <div class="hpbar-label">HULL</div>
        <div class="hpbar-bg"><div class="hpbar-fill" id="hpFill"></div></div>
      </div>
      <div class="online-badge"><span class="dot"></span><span id="onlineCount">1</span> ONLINE</div>
    </div>
  </div>
  <div class="killfeed" id="killfeed"></div>
  <div class="score-toggle" id="scoreToggle">🏆 SCORE</div>
  <div class="scoreboard hidden" id="scoreboard"><h4>SCOREBOARD</h4><table id="scoreTable"></table></div>
  <div class="sync-note">NETCODE: SOCKET.IO LIVE</div>

  <div class="overlay hidden" id="deathScreen">
    <div class="t">ELIMINATED</div>
    <div class="c" id="respawnCount">3</div>
    <div class="by" id="killedByText"></div>
  </div>

  <div class="overlay" id="joinScreen">
    <div>
      <p class="title-jp">流星掃射</p>
      <p class="title-en">-ARENA- LIVE SERVER</p>
    </div>
    <p class="desc">
      同じ<b>ルームコード</b>を入力した仲間と対戦できます(空欄なら"default"部屋)。<br>
      <b>PC</b>: WASD移動・マウス照準・クリック/スペースで射撃<br>
      <b>スマホ</b>: 左半分=移動 / 右半分=照準+射撃
    </p>
    <div class="field">
      <label>パイロット名</label>
      <input type="text" id="nameInput" maxlength="12" />
    </div>
    <div class="field">
      <label>ルームコード(友達と揃える)</label>
      <input type="text" id="roomInput" maxlength="24" placeholder="default" />
    </div>
    <div class="swatches" id="colorSwatches"></div>
    <button class="btn" id="joinBtn">ENTER ARENA</button>
    <div class="status" id="statusText">サーバー接続待機中…</div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
(function(){
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const W = 480, H = 760;
  canvas.width = W; canvas.height = H;

  const PALETTE = [
    {name:'cyan', hex:'#4cf3ff'}, {name:'magenta', hex:'#ff2e88'}, {name:'amber', hex:'#ffd447'},
    {name:'lime', hex:'#8dff5c'}, {name:'violet', hex:'#b784ff'}, {name:'orange', hex:'#ff9d4c'}
  ];
  let myName = 'PILOT-' + Math.floor(1000+Math.random()*9000);
  let myColor = PALETTE[Math.floor(Math.random()*PALETTE.length)].hex;
  document.getElementById('nameInput').value = myName;
  const swatchWrap = document.getElementById('colorSwatches');
  PALETTE.forEach(c=>{
    const el = document.createElement('div');
    el.className = 'swatch' + (c.hex===myColor?' selected':'');
    el.style.background = c.hex; el.style.color = c.hex;
    el.addEventListener('click', ()=>{
      myColor = c.hex;
      [...swatchWrap.children].forEach(ch=>ch.classList.remove('selected'));
      el.classList.add('selected');
    });
    swatchWrap.appendChild(el);
  });

  // ---------- socket ----------
  const socket = io();
  const statusEl = document.getElementById('statusText');
  const joinBtn = document.getElementById('joinBtn');
  socket.on('connect', ()=>{ statusEl.textContent = 'サーバー接続 OK'; statusEl.classList.remove('err'); joinBtn.disabled=false; });
  socket.on('disconnect', ()=>{ statusEl.textContent = 'サーバーから切断されました'; statusEl.classList.add('err'); });
  socket.on('connect_error', ()=>{ statusEl.textContent = '接続エラー(サーバーが起動しているか確認)'; statusEl.classList.add('err'); });

  let WORLD = { w: 1400, h: 1400 };
  let OBSTACLES = [];
  let selfId = null;
  let started = false;

  const me = { x:0, y:0, angle:0, hp:100, alive:true, name:myName, color:myColor, kills:0, deaths:0, invulnUntil:0 };
  const others = new Map();
  let tracers = [], killFeedItems = [], respawnTimer = 0;

  document.getElementById('joinBtn').addEventListener('click', ()=>{
    const val = document.getElementById('nameInput').value.trim();
    if(val) myName = val.slice(0,12);
    const room = document.getElementById('roomInput').value.trim() || 'default';
    me.name = myName; me.color = myColor;
    socket.emit('join', { name: myName, color: myColor, room });
    document.getElementById('joinScreen').classList.add('hidden');
    started = true;
  });

  socket.on('init', (data)=>{
    selfId = data.selfId; WORLD = data.world; OBSTACLES = data.obstacles;
    others.clear();
    data.players.forEach(p=>{
      if(p.id===selfId){
        me.x=p.x; me.y=p.y; me.angle=p.angle; me.hp=p.hp; me.alive=p.alive;
        me.kills=p.kills; me.deaths=p.deaths; me.invulnUntil=p.invulnUntil;
        updateHpBar();
      } else {
        others.set(p.id, {...p, prevX:p.x, prevY:p.y, prevTs:Date.now(), curX:p.x, curY:p.y, curTs:Date.now()});
      }
    });
    updateOnlineCount();
  });

  socket.on('playerJoined', (p)=>{
    if(p.id===selfId) return;
    others.set(p.id, {...p, prevX:p.x, prevY:p.y, prevTs:Date.now(), curX:p.x, curY:p.y, curTs:Date.now()});
    updateOnlineCount();
  });

  socket.on('playerLeft', ({id})=>{ others.delete(id); updateOnlineCount(); });

  socket.on('playerMoved', ({id,x,y,angle})=>{
    const o = others.get(id); if(!o) return;
    o.prevX=o.curX; o.prevY=o.curY; o.prevTs=o.curTs;
    o.curX=x; o.curY=y; o.curTs=Date.now(); o.angle=angle;
  });

  socket.on('shotFired', (data)=>{
    tracers.push({x1:data.x1,y1:data.y1,x2:data.x2,y2:data.y2,life:10,
      color: data.shooterId===selfId ? me.color : (others.get(data.shooterId)?.color || '#4cf3ff')});
    if(data.hit) tracers.push({x1:data.x2,y1:data.y2,x2:data.x2,y2:data.y2,life:14,color:'#ffffff',spark:true});
    beep(760,0.04,'square',0.02);
  });

  socket.on('damaged', ({id,hp})=>{
    if(id===selfId){ me.hp=hp; updateHpBar(); beep(300,0.08,'square',0.03); }
    else { const o = others.get(id); if(o) o.hp=hp; }
  });

  socket.on('killed', ({targetId,targetName,killerId,killerName})=>{
    pushKillFeed(killerName + ' が ' + targetName + ' を撃破！', killerId===selfId?me.color:(others.get(killerId)?.color||'#ffd447'));
    if(killerId===selfId){ me.kills++; beep(520,0.15,'triangle',0.06); }
    else { const k=others.get(killerId); if(k) k.kills++; }

    if(targetId===selfId){
      me.alive=false; me.hp=0; me.deaths++;
      document.getElementById('killedByText').textContent = killerName + ' にやられた…';
      document.getElementById('deathScreen').classList.remove('hidden');
      respawnTimer = 180;
      beep(90,0.3,'sawtooth',0.08);
      updateHpBar();
    } else {
      const t = others.get(targetId); if(t){ t.alive=false; t.hp=0; t.deaths++; }
    }
  });

  socket.on('respawned', ({id,x,y})=>{
    if(id===selfId){
      me.x=x; me.y=y; me.hp=100; me.alive=true;
      document.getElementById('deathScreen').classList.add('hidden');
      updateHpBar();
    } else {
      const o = others.get(id); if(o){ o.x=x; o.y=y; o.curX=x; o.curY=y; o.prevX=x; o.prevY=y; o.hp=100; o.alive=true; }
    }
  });

  function updateOnlineCount(){ document.getElementById('onlineCount').textContent = others.size+1; }

  // ---------- input ----------
  const keys = {};
  window.addEventListener('keydown', e=>{ keys[e.key.toLowerCase()]=true; if(e.key===' ') e.preventDefault(); });
  window.addEventListener('keyup', e=>{ keys[e.key.toLowerCase()]=false; });

  let mouseAngle=0, mouseDown=false, hasMouse=false;
  const stage = document.getElementById('stage');
  stage.addEventListener('mousemove', e=>{
    hasMouse=true;
    const rect = canvas.getBoundingClientRect();
    const lx = (e.clientX-rect.left)/rect.width*W, ly = (e.clientY-rect.top)/rect.height*H;
    mouseAngle = Math.atan2(ly-H/2, lx-W/2);
  });
  stage.addEventListener('mousedown', ()=>{ mouseDown=true; });
  window.addEventListener('mouseup', ()=>{ mouseDown=false; });

  const touchPointers = {};
  function localXY(cx,cy){ const rect=canvas.getBoundingClientRect(); return {x:(cx-rect.left)/rect.width*W, y:(cy-rect.top)/rect.height*H}; }
  stage.addEventListener('pointerdown', e=>{
    if(e.pointerType!=='touch') return;
    const p = localXY(e.clientX, e.clientY);
    touchPointers[e.pointerId] = { zone: p.x<W/2?'left':'right', ox:p.x, oy:p.y, cx:p.x, cy:p.y };
  });
  window.addEventListener('pointermove', e=>{
    const tp = touchPointers[e.pointerId]; if(!tp) return;
    const p = localXY(e.clientX, e.clientY); tp.cx=p.x; tp.cy=p.y;
  });
  function endTouch(e){ delete touchPointers[e.pointerId]; }
  window.addEventListener('pointerup', endTouch);
  window.addEventListener('pointercancel', endTouch);
  function getStick(zone){
    for(const id in touchPointers){
      const tp = touchPointers[id];
      if(tp.zone===zone){
        let dx=tp.cx-tp.ox, dy=tp.cy-tp.oy;
        const len=Math.hypot(dx,dy), max=46;
        if(len>max){ dx=dx/len*max; dy=dy/len*max; }
        return {dx,dy,len:Math.min(len,max),active:true,ox:tp.ox,oy:tp.oy,cx:tp.ox+dx,cy:tp.oy+dy};
      }
    }
    return {active:false};
  }

  let actx;
  function beep(freq,dur,type,vol){
    try{
      if(!actx) actx = new (window.AudioContext||window.webkitAudioContext)();
      const o=actx.createOscillator(), g=actx.createGain();
      o.type=type||'square'; o.frequency.value=freq; g.gain.value=vol||0.05;
      o.connect(g); g.connect(actx.destination); o.start();
      g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime+dur);
      o.stop(actx.currentTime+dur);
    }catch(e){}
  }

  function pushKillFeed(text,color){ killFeedItems.push({text,color,t:Date.now()}); renderKillFeed(); }
  function renderKillFeed(){
    const el = document.getElementById('killfeed'); const now=Date.now();
    killFeedItems = killFeedItems.filter(k=> now-k.t<4500);
    el.innerHTML='';
    killFeedItems.slice(-4).forEach(k=>{
      const d=document.createElement('div'); d.textContent=k.text; d.style.borderLeftColor=k.color; el.appendChild(d);
    });
  }
  function updateHpBar(){ document.getElementById('hpFill').style.width = Math.max(0,me.hp)+'%'; }

  document.getElementById('scoreToggle').addEventListener('click', ()=>{
    document.getElementById('scoreboard').classList.toggle('hidden'); renderScoreboard();
  });
  function renderScoreboard(){
    const rows = [{name:me.name+' (YOU)', color:me.color, kills:me.kills, deaths:me.deaths}];
    others.forEach(o=> rows.push({name:o.name, color:o.color, kills:o.kills, deaths:o.deaths}));
    rows.sort((a,b)=>b.kills-a.kills);
    document.getElementById('scoreTable').innerHTML = rows.map(r=>
      '<tr><td class="nm" style="color:'+r.color+'">● '+escapeHtml(r.name)+'</td><td class="kd">'+r.kills+'K / '+r.deaths+'D</td></tr>'
    ).join('');
  }
  function escapeHtml(s){ return s.replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  // ---------- game loop ----------
  let moveTick=0, fireCooldown=0;

  function update(){
    if(!started) return;

    if(!me.alive){
      if(respawnTimer>0){
        respawnTimer--;
        document.getElementById('respawnCount').textContent = Math.ceil(respawnTimer/60);
      }
      renderKillFeed();
      return;
    }

    let dx=0, dy=0;
    if(keys['arrowleft']||keys['a']) dx-=1;
    if(keys['arrowright']||keys['d']) dx+=1;
    if(keys['arrowup']||keys['w']) dy-=1;
    if(keys['arrowdown']||keys['s']) dy+=1;
    const leftStick = getStick('left');
    if(leftStick.active && leftStick.len>6){ dx=leftStick.dx/46; dy=leftStick.dy/46; }
    const mlen = Math.hypot(dx,dy);
    const speed = 3.4;
    if(mlen>0.05){
      const nx = mlen>1?dx/mlen:dx, ny = mlen>1?dy/mlen:dy;
      let newX = me.x+nx*speed, newY = me.y+ny*speed;
      newX = Math.max(20, Math.min(WORLD.w-20, newX));
      newY = Math.max(20, Math.min(WORLD.h-20, newY));
      for(const o of OBSTACLES){
        const d = Math.hypot(newX-o.x, newY-o.y), minD = o.r+16;
        if(d<minD && d>0){ newX=o.x+(newX-o.x)/d*minD; newY=o.y+(newY-o.y)/d*minD; }
      }
      me.x=newX; me.y=newY;
    }

    const rightStick = getStick('right');
    let firing=false;
    if(rightStick.active){
      if(rightStick.len>10) me.angle = Math.atan2(rightStick.dy, rightStick.dx);
      firing = true;
    } else if(hasMouse){
      me.angle = mouseAngle; firing = mouseDown || keys[' '];
    }

    fireCooldown--;
    if(firing && fireCooldown<=0){
      socket.emit('shoot', {angle: me.angle});
      fireCooldown = 15;
    }

    moveTick++;
    if(moveTick % 2 === 0){ // ~30Hz
      socket.emit('move', {x: me.x, y: me.y, angle: me.angle});
    }

    tracers.forEach(t=>t.life--); tracers = tracers.filter(t=>t.life>0);
    renderKillFeed();
  }

  function lerp(a,b,t){ return a+(b-a)*t; }
  function drawShip(x,y,angle,color,invuln,label,hp){
    ctx.save(); ctx.translate(x,y); ctx.rotate(angle+Math.PI/2);
    if(invuln) ctx.globalAlpha = 0.4+0.3*Math.sin(Date.now()/80);
    ctx.shadowColor=color; ctx.shadowBlur=12; ctx.fillStyle=color;
    ctx.beginPath(); ctx.moveTo(0,-16); ctx.lineTo(12,14); ctx.lineTo(0,7); ctx.lineTo(-12,14); ctx.closePath(); ctx.fill();
    ctx.restore();
    ctx.save(); ctx.globalAlpha=1; ctx.font='9px Space Mono'; ctx.fillStyle='rgba(232,236,255,0.85)'; ctx.textAlign='center';
    ctx.fillText(label, x, y-26);
    if(hp!==undefined){
      ctx.fillStyle='rgba(255,255,255,0.15)'; ctx.fillRect(x-16,y-22,32,3);
      ctx.fillStyle = hp>50?'#8dff5c':hp>25?'#ffd447':'#ff2e88';
      ctx.fillRect(x-16,y-22,32*Math.max(0,hp)/100,3);
    }
    ctx.restore();
  }

  function draw(){
    ctx.clearRect(0,0,W,H);
    if(!started) return;
    const camX = me.x-W/2, camY = me.y-H/2;
    ctx.save(); ctx.translate(-camX,-camY);

    ctx.strokeStyle='rgba(76,243,255,0.06)'; ctx.lineWidth=1;
    const grid=60, startGX=Math.floor(camX/grid)*grid, startGY=Math.floor(camY/grid)*grid;
    for(let gx=startGX; gx<camX+W+grid; gx+=grid){ ctx.beginPath(); ctx.moveTo(gx,camY); ctx.lineTo(gx,camY+H); ctx.stroke(); }
    for(let gy=startGY; gy<camY+H+grid; gy+=grid){ ctx.beginPath(); ctx.moveTo(camX,gy); ctx.lineTo(camX+W,gy); ctx.stroke(); }

    ctx.strokeStyle='rgba(255,46,136,0.4)'; ctx.lineWidth=4; ctx.strokeRect(0,0,WORLD.w,WORLD.h);

    OBSTACLES.forEach(o=>{
      ctx.save(); ctx.shadowColor='#6b7394'; ctx.shadowBlur=8;
      ctx.fillStyle='rgba(60,70,110,0.55)'; ctx.strokeStyle='rgba(107,115,148,0.9)'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(o.x,o.y,o.r,0,Math.PI*2); ctx.fill(); ctx.stroke(); ctx.restore();
    });

    tracers.forEach(t=>{
      ctx.save(); ctx.globalAlpha = Math.max(0,t.life/10);
      ctx.strokeStyle=t.color; ctx.shadowColor=t.color; ctx.shadowBlur=8; ctx.lineWidth=2;
      if(t.spark){ ctx.fillStyle=t.color; ctx.beginPath(); ctx.arc(t.x1,t.y1,5*(t.life/14),0,Math.PI*2); ctx.fill(); }
      else { ctx.beginPath(); ctx.moveTo(t.x1,t.y1); ctx.lineTo(t.x2,t.y2); ctx.stroke(); }
      ctx.restore();
    });

    const now = Date.now();
    others.forEach(o=>{
      if(!o.alive) return;
      let t = (now-o.curTs)/33; // ~30Hz update interval
      t = Math.max(0, Math.min(1.5, t));
      const rx = lerp(o.prevX, o.curX, Math.min(1,t));
      const ry = lerp(o.prevY, o.curY, Math.min(1,t));
      drawShip(rx, ry, o.angle||0, o.color, (o.invulnUntil||0)>now, o.name, o.hp);
    });

    if(me.alive) drawShip(me.x, me.y, me.angle, me.color, me.invulnUntil>now, me.name+' (YOU)', me.hp);
    ctx.restore();

    const ls=getStick('left'), rs=getStick('right');
    [ls,rs].forEach(s=>{
      if(!s.active) return;
      ctx.save(); ctx.globalAlpha=0.35; ctx.strokeStyle='#4cf3ff'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(s.ox,s.oy,46,0,Math.PI*2); ctx.stroke();
      ctx.fillStyle='#4cf3ff'; ctx.beginPath(); ctx.arc(s.cx,s.cy,16,0,Math.PI*2); ctx.fill();
      ctx.restore();
    });
  }

  function loop(){ update(); draw(); requestAnimationFrame(loop); }
  loop();
  setInterval(()=>{ if(started) renderScoreboard(); }, 1500);
})();
</script>
</body>
</html>
